spring:
  datasource:
    url: jdbc:postgresql://postgres:5435/eclaims
    username: eclaims
    password: eclaims123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration

storage:
  minio:
    endpoint: http://minio:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: eclaims-documents
    use-path-style-access: true

mail:
  smtp:
    host: mailhog
    port: 1025
    auth: false
    starttls:
      enable: false

logging:
  level:
    root: INFO
    com.nagarro.eclaims: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
